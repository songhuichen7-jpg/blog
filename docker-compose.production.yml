services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: curator
      POSTGRES_PASSWORD: ${DB_PASSWORD:-curator_prod_change_me}
      POSTGRES_DB: curator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curator"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://curator:${DB_PASSWORD:-curator_prod_change_me}@db:5432/curator?schema=public
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      SESSION_SECRET: ${SESSION_SECRET}
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
